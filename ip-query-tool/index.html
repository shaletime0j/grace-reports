<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP 地区批量查询工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; color: white; margin-bottom: 30px; }
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        textarea {
            width: 100%;
            min-height: 200px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: monospace;
            resize: vertical;
        }
        button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-right: 10px;
            margin-top: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .progress {
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            display: none;
        }
        .progress.active { display: block; }
        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            transition: width 0.3s;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        th { background: #f8f9fa; font-weight: 600; }
        .status-success { color: #28a745; }
        .status-error { color: #dc3545; }
        .results { display: none; }
        .results.active { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 IP 地区批量查询工具</h1>
        
        <div class="card">
            <h3 style="margin-bottom: 15px;">输入 IP 列表（每行一个）</h3>
            <textarea id="ipInput" placeholder="支持格式：&#10;1. 136.0.108.213:5889:user:pass&#10;2. 64.137.90.202&#10;3. 45.252.58.66:6695:user:pass&#10;&#10;会自动提取IP，忽略端口和账号"></textarea>
            <div style="margin-top: 15px;">
                <button class="btn-primary" onclick="startQuery()">开始查询</button>
                <button class="btn-secondary" onclick="clearAll()">清空</button>
            </div>
            
            <div class="progress" id="progressDiv">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressBar" style="width: 0%">0%</div>
                </div>
                <p style="margin-top: 10px;">
                    总计: <span id="totalCount">0</span> | 
                    成功: <span id="successCount" style="color: #28a745;">0</span> | 
                    失败: <span id="errorCount" style="color: #dc3545;">0</span>
                </p>
            </div>
        </div>
        
        <div class="card results" id="resultsDiv">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3>查询结果</h3>
                <button class="btn-secondary" onclick="exportCSV()">导出 CSV</button>
            </div>
            <div style="overflow-x: auto;">
                <table id="resultsTable">
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th>IP 地址</th>
                            <th>状态</th>
                            <th>国家</th>
                            <th>地区</th>
                            <th>城市</th>
                            <th>ISP</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 国家名称映射
        const COUNTRY_MAP = {
            'China': '中国', 'Hong Kong': '香港', 'Taiwan': '台湾',
            'Japan': '日本', 'Singapore': '新加坡', 'South Korea': '韩国',
            'India': '印度', 'Thailand': '泰国', 'Vietnam': '越南',
            'Malaysia': '马来西亚', 'Indonesia': '印度尼西亚', 'Philippines': '菲律宾',
            'United States': '美国', 'Canada': '加拿大', 'Mexico': '墨西哥',
            'United Kingdom': '英国', 'Germany': '德国', 'France': '法国',
            'Italy': '意大利', 'Spain': '西班牙', 'Netherlands': '荷兰',
            'Switzerland': '瑞士', 'Sweden': '瑞典', 'Poland': '波兰',
            'Austria': '奥地利', 'Greece': '希腊', 'Ukraine': '乌克兰',
            'Czechia': '捷克', 'Romania': '罗马尼亚', 'Croatia': '克罗地亚',
            'Denmark': '丹麦', 'Ireland': '爱尔兰', 'Finland': '芬兰',
            'Russia': '俄罗斯', 'Brazil': '巴西', 'Australia': '澳大利亚',
            'Turkey': '土耳其', 'Türkiye': '土耳其', 'South Africa': '南非',
        };
        
        let results = [];
        
        // 提取IP（简单直接的方式）
        function extractIP(line) {
            line = line.trim();
            if (!line) return null;
            
            // 去掉序号（如 "1."、"2)" 等）
            let content = line;
            const indexMatch = line.match(/^(\d+)\s*[\.、\)]\s*(.+)$/);
            let index = '';
            if (indexMatch) {
                index = indexMatch[1];
                content = indexMatch[2];
            }
            
            // 取冒号前的部分
            let ip = content.split(':')[0].trim();
            
            // 简单验证：必须是 x.x.x.x 格式
            const parts = ip.split('.');
            if (parts.length !== 4) return null;
            
            // 检查每个部分是否是数字且在0-255之间
            for (let part of parts) {
                const num = parseInt(part, 10);
                if (isNaN(num) || num < 0 || num > 255) return null;
            }
            
            return { index, ip };
        }
        
        // 查询单个IP
        async function queryOne(ip) {
            try {
                const res = await fetch(`http://ip-api.com/json/${ip}?fields=status,country,regionName,city,isp`);
                const data = await res.json();
                
                if (data.status === 'success') {
                    return {
                        status: 'success',
                        country: COUNTRY_MAP[data.country] || data.country,
                        region: data.regionName || '-',
                        city: data.city || '-',
                        isp: data.isp || '-'
                    };
                }
                return { status: 'failed', country: '查询失败', region: '-', city: '-', isp: '-' };
            } catch (e) {
                return { status: 'error', country: '错误', region: '-', city: '-', isp: e.message };
            }
        }
        
        // 开始查询
        async function startQuery() {
            const input = document.getElementById('ipInput').value;
            const lines = input.split('\n');
            
            // 解析所有行
            const items = [];
            for (let line of lines) {
                const parsed = extractIP(line);
                if (parsed) items.push(parsed);
            }
            
            if (items.length === 0) {
                alert('没有找到有效的IP地址');
                return;
            }
            
            results = [];
            document.getElementById('progressDiv').classList.add('active');
            document.getElementById('resultsDiv').classList.remove('active');
            
            let success = 0, error = 0;
            
            for (let i = 0; i < items.length; i++) {
                const item = items[i];
                const result = await queryOne(item.ip);
                
                results.push({
                    index: item.index || (i + 1),
                    ip: item.ip,
                    ...result
                });
                
                if (result.status === 'success') success++;
                else error++;
                
                // 更新进度
                const progress = ((i + 1) / items.length * 100).toFixed(0);
                document.getElementById('progressBar').style.width = progress + '%';
                document.getElementById('progressBar').textContent = progress + '%';
                document.getElementById('totalCount').textContent = items.length;
                document.getElementById('successCount').textContent = success;
                document.getElementById('errorCount').textContent = error;
                
                // 每5个暂停一下，避免请求过快
                if ((i + 1) % 5 === 0 && i < items.length - 1) {
                    await new Promise(r => setTimeout(r, 1000));
                }
            }
            
            showResults();
        }
        
        // 显示结果
        function showResults() {
            const tbody = document.getElementById('resultsBody');
            tbody.innerHTML = results.map(r => `
                <tr>
                    <td>${r.index}</td>
                    <td>${r.ip}</td>
                    <td class="status-${r.status === 'success' ? 'success' : 'error'}">${r.status === 'success' ? '成功' : '失败'}</td>
                    <td>${r.country}</td>
                    <td>${r.region}</td>
                    <td>${r.city}</td>
                    <td>${r.isp}</td>
                </tr>
            `).join('');
            
            document.getElementById('resultsDiv').classList.add('active');
        }
        
        // 清空
        function clearAll() {
            document.getElementById('ipInput').value = '';
            document.getElementById('progressDiv').classList.remove('active');
            document.getElementById('resultsDiv').classList.remove('active');
            results = [];
        }
        
        // 导出CSV
        function exportCSV() {
            const csv = [
                ['序号', 'IP地址', '状态', '国家', '地区', '城市', 'ISP'],
                ...results.map(r => [r.index, r.ip, r.status === 'success' ? '成功' : '失败', r.country, r.region, r.city, r.isp])
            ].map(row => row.join(',')).join('\n');
            
            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ip_results_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
        }
    </script>
</body>
</html>
